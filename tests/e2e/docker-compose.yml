services:
  mock-oidc:
    build: ./mock-oidc
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/.well-known/openid-configuration"]
      interval: 2s
      retries: 5

  backend:
    build:
      context: ../../
      dockerfile: backend/Dockerfile
    working_dir: /app
    volumes:
      - ./backend-config.toml:/app/config.toml:ro
    depends_on:
      mock-oidc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 3s
      retries: 10

  fake-runner-gpu:
    build: ./fake-runner
    environment:
      RUNNER_ID: gpu-server-1
      RUNNER_NAME: GPU Server
      MACHINE_TYPE: gpu-server
      HTTP_PORT: "8080"
      BACKEND_WS_URL: ws://backend:8080/ws/runners
      AUTH_TOKEN: test-runner-secret
      MODELS: "llama3:8b,llama3:70b"
      MAC_ADDRESS: "AA:BB:CC:DD:EE:01"
    depends_on:
      backend:
        condition: service_healthy

  fake-runner-halo:
    build: ./fake-runner
    environment:
      RUNNER_ID: halo-1
      RUNNER_NAME: Halo Machine
      MACHINE_TYPE: halo
      HTTP_PORT: "8080"
      BACKEND_WS_URL: ws://backend:8080/ws/runners
      AUTH_TOKEN: test-runner-secret
      MODELS: "llama3:8b"
      MAC_ADDRESS: "AA:BB:CC:DD:EE:02"
    depends_on:
      backend:
        condition: service_healthy

  test-runner:
    build:
      context: ../
      dockerfile: e2e/Dockerfile.test-runner
    environment:
      MOCK_OIDC_URL: http://mock-oidc:9090
    depends_on:
      fake-runner-gpu:
        condition: service_started
      fake-runner-halo:
        condition: service_started
